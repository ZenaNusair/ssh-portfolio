app = "zena-portfolio"
primary_region = "fra"

[build]

[env]
  HOST_KEY_PATH = "/app/.ssh/host_key"
  PORT = "2222"

[[services]]
  internal_port = 2222
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    port = 22

[checks]
  [checks.alive]
    type = "tcp"
    port = 2222
    interval = "30s"
    timeout = "5s"

[[vm]]
  size = "performance-1x"
  memory = "2gb"
